name: Feature proposal
description: Propose a focused improvement to the shared social core.
title: '[Proposal]: '
labels:
  - enhancement
body:
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and pull requests for this proposal.
          required: true
        - label: This proposal strengthens the shared core rather than one product-specific experience.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem needs to be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the behavior and why it belongs in the core.
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Privacy, safety, and extension boundaries
      description: Explain any effect on authorization, moderation, personal data, or extension contracts.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
