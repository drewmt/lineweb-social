name: Bug report
description: Report a reproducible problem in Lineweb Social.
title: '[Bug]: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. This project is currently an alpha.
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and pull requests for this problem.
          required: true
        - label: I removed credentials, private user data, and other sensitive information.
          required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.1.0-alpha.1 or a commit SHA
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest reliable sequence that demonstrates the problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include PHP, database, Node.js, browser, operating system, and relevant deployment details.
    validations:
      required: true
